name: build

on:
  push:
    branches: ["**"]
    tags: ["v*", "V*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Build
  # ============================================================================
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
            llvm_version: "18"
          - os: macOS
            runner: macos-latest
            llvm_version: "18"
          - os: Windows
            runner: windows-latest
            llvm_version: "18"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ matrix.llvm_version }}
          sudo apt-get install -y libclang-${{ matrix.llvm_version }}-dev
          echo "LLVM_DIR=/usr/lib/llvm-${{ matrix.llvm_version }}" >> $GITHUB_ENV

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@${{ matrix.llvm_version }} || true
          echo "LLVM_DIR=$(brew --prefix llvm@${{ matrix.llvm_version }})" >> $GITHUB_ENV

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Use whatever LLVM is already on the runner, or install if missing
          $llvmDir = "C:\Program Files\LLVM"
          if (-not (Test-Path "$llvmDir\lib\libclang.lib")) {
            choco install llvm --force -y
          }
          echo "LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$LLVM_DIR" \
            -DCLANGSQL_WITH_HTTP=ON \
            -DCLANGSQL_WITH_AI_AGENT=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/bin/clangsql dist/ 2>/dev/null || cp build/src/cli/clangsql dist/ 2>/dev/null || true
          ls -la dist/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp build/bin/clangsql dist/ 2>/dev/null || cp build/src/cli/clangsql dist/ 2>/dev/null || true
          ls -la dist/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/bin/Release/clangsql.exe dist/ 2>/dev/null || \
          cp build/src/cli/Release/clangsql.exe dist/ 2>/dev/null || true
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clangsql-${{ matrix.os }}
          path: dist/
          if-no-files-found: warn

  # ============================================================================
  # Release
  # ============================================================================
  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release
        run: |
          cd artifacts
          zip -r ../clangsql-linux.zip clangsql-Linux/ 2>/dev/null || true
          zip -r ../clangsql-macos.zip clangsql-macOS/ 2>/dev/null || true
          zip -r ../clangsql-windows.zip clangsql-Windows/ 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clangsql-linux.zip
            clangsql-macos.zip
            clangsql-windows.zip
          generate_release_notes: true
